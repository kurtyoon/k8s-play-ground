                "hide": 0,
                "includeAll": false,
                "label": "Datasource",
                "multi": false,
                "name": "datasource",
                "options": [],
                "query": "prometheus",
                "queryValue": "",
                "refresh": 1,
                "regex": "",
                "skipUrlSync": false,
                "type": "datasource"
              }
            ]
          },
          "time": {"from": "now-1h", "to": "now"},
          "timepicker": {},
          "timezone": "browser",
          "title": "K8s Cluster Overview",
          "uid": "k8s-overview",
          "version": 1,
          "weekStart": ""
