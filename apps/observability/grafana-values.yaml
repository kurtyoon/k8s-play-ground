# Grafana - Visualization for VictoriaMetrics & VictoriaLogs
# https://grafana.com/

replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pre-configured datasources for Victoria stack
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://victoria-metrics-victoria-metrics-single-server.observability.svc.cluster.local:8428
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 30s
          httpMethod: POST
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        url: http://victoria-logs-victoria-logs-single-server.observability.svc.cluster.local:9428
        access: proxy
        editable: false

# Install VictoriaLogs datasource plugin
plugins:
  - victoriametrics-logs-datasource

# Dashboard provisioning
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    k8s-overview:
      json: |
        {
          "annotations": {"list": []},
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "id": null,
          "links": [],
          "panels": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "fieldConfig": {
                "defaults": {"color": {"mode": "thresholds"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short"},
                "overrides": []
              },
              "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
              "id": 1,
              "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "percentChangeColorMode": "standard", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showPercentChange": false, "textMode": "auto", "wideLayout": true},
              "pluginVersion": "12.3.1",
              "targets": [
                {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(kubelet_running_pods)", "refId": "A"}
              ],
              "title": "Running Pods",
              "type": "stat"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "fieldConfig": {
                "defaults": {"color": {"mode": "thresholds"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short"},
                "overrides": []
              },
              "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
              "id": 2,
              "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "percentChangeColorMode": "standard", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showPercentChange": false, "textMode": "auto", "wideLayout": true},
              "pluginVersion": "12.3.1",
              "targets": [
                {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(kubelet_running_containers)", "refId": "A"}
              ],
              "title": "Running Containers",
              "type": "stat"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "fieldConfig": {
                "defaults": {"color": {"mode": "thresholds"}, "mappings": [], "max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}, "unit": "percent"},
                "overrides": []
              },
              "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
              "id": 3,
              "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "percentChangeColorMode": "standard", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showPercentChange": false, "textMode": "auto", "wideLayout": true},
              "pluginVersion": "12.3.1",
              "targets": [
                {"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) / sum(machine_cpu_cores) * 100", "refId": "A"}
              ],
              "title": "Cluster CPU %",
              "type": "stat"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "fieldConfig": {
                "defaults": {"color": {"mode": "thresholds"}, "mappings": [], "max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}, "unit": "percent"},
                "overrides": []
              },
              "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
              "id": 4,
              "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "percentChangeColorMode": "standard", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showPercentChange": false, "textMode": "auto", "wideLayout": true},
