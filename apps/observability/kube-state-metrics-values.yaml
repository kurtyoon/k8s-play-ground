resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

service:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
