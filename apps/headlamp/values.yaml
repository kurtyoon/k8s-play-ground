---
# Headlamp - Kubernetes Web UI
# https://headlamp.dev/
# Maintained by: Kubernetes SIG UI
#
# Deployment: Argo CD Helm Application (GitOps Operator pattern)
# Chart source: https://kubernetes-sigs.github.io/headlamp/
# Values below are merged with the upstream Helm chart defaults.

image:
  repository: ghcr.io/headlamp-k8s/headlamp
  tag: v0.41.0
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  inCluster: true

serviceAccount:
  create: true
  name: headlamp

ingress:
  enabled: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - host: headlamp.local
      paths:
        - path: /
          type: Prefix
  tls: []
