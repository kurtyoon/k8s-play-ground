---
# ClusterSecretStore: OpenBao backend for External Secrets Operator
#
# PREREQUISITES (must be done after OpenBao is initialized):
#   1. Initialize and unseal OpenBao
#   2. Enable Kubernetes auth:  bao auth enable kubernetes
#   3. Configure K8s auth:      bao write auth/kubernetes/config ...
#   4. Create a policy:         bao policy write external-secrets ...
#   5. Create a role:           bao write auth/kubernetes/role/external-secrets ...
#
# After the above steps, ESO will use this ClusterSecretStore to sync
# OpenBao secrets into Kubernetes Secrets.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao-backend
spec:
  provider:
    vault:
      server: "http://openbao.vault.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
