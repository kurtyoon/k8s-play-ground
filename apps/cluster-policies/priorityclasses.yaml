apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: platform-critical
value: 1000000000
preemptionPolicy: PreemptLowerPriority
globalDefault: false
description: Platform infrastructure workloads (monitoring, ingress, cert-manager)
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: app-standard
value: 1000000
preemptionPolicy: PreemptLowerPriority
globalDefault: true
description: Default priority for application workloads
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: app-low
value: 100000
preemptionPolicy: PreemptLowerPriority
globalDefault: false
description: Low priority for batch jobs and non-essential workloads
