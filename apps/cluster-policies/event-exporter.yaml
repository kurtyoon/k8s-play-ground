apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-config
  namespace: observability
  labels:
    app.kubernetes.io/name: event-exporter
    app.kubernetes.io/part-of: observability
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    maxEventAgeSeconds: 3600
    route:
      routes:
        - match:
            - receiver: vlogs
    receivers:
      - name: vlogs
        webhook:
          endpoint: "http://victoria-logs-victoria-logs-single-server:9428/insert/jsonline?_stream_fields=namespace,source,kind"
          headers:
            Content-Type: application/json
          layout:
            _msg: "{{ .Message }}"
            namespace: "{{ .Namespace }}"
            reason: "{{ .Reason }}"
            type: "{{ .Type }}"
            kind: "{{ .InvolvedObject.Kind }}"
            name: "{{ .InvolvedObject.Name }}"
            source: "{{ .Source.Component }}"
            count: "{{ .Count }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: event-exporter
    app.kubernetes.io/part-of: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-exporter
        app.kubernetes.io/part-of: observability
    spec:
      serviceAccountName: event-exporter
      automountServiceAccountToken: true
      priorityClassName: app-standard
      containers:
        - name: exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
          imagePullPolicy: IfNotPresent
          args:
            - -conf=/data/config.yaml
          volumeMounts:
            - name: config
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: event-exporter-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: event-exporter
    app.kubernetes.io/part-of: observability
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-exporter
rules:
  - apiGroups: [""]
    resources: ["events", "pods", "configmaps", "nodes", "services"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies", "policies"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: event-exporter
subjects:
  - kind: ServiceAccount
    name: event-exporter
    namespace: observability
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: event-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: event-exporter
    app.kubernetes.io/part-of: observability
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-exporter
