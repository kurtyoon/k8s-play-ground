apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-filesystem
  namespace: web-filesystem
  labels:
    app.kubernetes.io/name: web-filesystem
    app.kubernetes.io/part-of: agent-filesystem
  annotations:
    # Generic annotations that work with most ingress controllers
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: web-filesystem.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-filesystem
                port:
                  number: 80
