apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-filesystem
  namespace: web-filesystem
  labels:
    app.kubernetes.io/name: web-filesystem
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/part-of: agent-filesystem
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: web-filesystem
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-filesystem
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/part-of: agent-filesystem
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: web-filesystem
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: server
          image: web-filesystem:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: web-filesystem-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/files?path=
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/files?path=
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          # Base overlay uses emptyDir; local overlay patches to hostPath
          emptyDir: {}
        - name: tmp
          emptyDir: {}
